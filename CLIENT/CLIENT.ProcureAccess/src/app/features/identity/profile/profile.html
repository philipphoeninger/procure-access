<h2 class="heading">Profile</h2>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 profile-table">
  <!-- Position Column -->
  <ng-container matColumnDef="position">
    <th mat-header-cell *matHeaderCellDef> No. </th>
    <td mat-cell *matCellDef="let element"> {{element.position}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <!-- Value Column -->
  <ng-container matColumnDef="value">
    <th mat-header-cell *matHeaderCellDef> Value </th>
    <td mat-cell *matCellDef="let element"> {{element.value}} </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let element"> <button matButton="filled" (click)="openChangeUserDialog(element)">Change</button> </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
<div class="profile-actions">
  <button matButton="filled" (click)="deleteAccount()" class="delete-btn">Delete</button>
</div>

<div class="proposals-container">
  <h3>Your open proposals</h3>
  <mat-list role="list">
    <mat-list-item role="listitem">
      <span matListItemIcon class="material-symbols-outlined">box</span>
      <!-- <mat-icon matListItemIcon>box</mat-icon> -->
      <span matListItemTitle>Product 1</span>
      <span>Status: draft</span>
      <div matListItemMeta>
        <button matIconButton (click)="null">
          <mat-icon>visibility</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>edit</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-list-item>
    <mat-list-item role="listitem">
      <mat-icon matListItemIcon>rule</mat-icon>
      <span matListItemTitle>Criterion 1</span>
      <span>Status: sent</span>
      <div matListItemMeta>
        <button matIconButton (click)="null">
          <mat-icon>visibility</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>edit</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-list-item>
    <mat-list-item role="listitem">
      <span matListItemIcon class="material-symbols-outlined">box</span>
      <!-- <mat-icon matListItemIcon>box</mat-icon> -->
      <span matListItemTitle>Product 2</span>
      <span>Status: sent</span>
      <div matListItemMeta>
        <button matIconButton (click)="null">
          <mat-icon>visibility</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>edit</mat-icon>
        </button>
        <button matIconButton (click)="null">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-list-item>
  </mat-list>
</div>
<div class="proposals-container">
  <h3>Closed proposals made by you</h3>
</div>
