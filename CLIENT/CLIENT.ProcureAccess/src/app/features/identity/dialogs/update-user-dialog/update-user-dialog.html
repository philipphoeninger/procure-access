<h2 mat-dialog-title>{{ 'COMMON.UPDATE' | translate }} {{ property().toLowerCase() }}</h2>
<mat-dialog-content>
  <p>{{ 'COMMON.TYPE_IN_YOUR_NEW' | translate }} {{ property().toLowerCase() }}</p>
  <mat-form-field id="property-input">
    <mat-label>{{ property() }}</mat-label>
    <input matInput [(ngModel)]="value" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">{{ 'COMMON.CANCEL' | translate }}</button>
  <button matButton [mat-dialog-close]="value()" cdkFocusInitial>{{ 'COMMON.SAVE' | translate }}</button>
</mat-dialog-actions>
