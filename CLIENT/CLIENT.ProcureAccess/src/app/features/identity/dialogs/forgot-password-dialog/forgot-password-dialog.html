<h2 mat-dialog-title>{{ 'AUTH.FORGOT_PW' | translate }}</h2>
<mat-dialog-content>
  <p>{{ 'AUTH.RESET_PW_MSG' | translate }}</p>
  <mat-form-field id="email-input">
    <mat-label>{{ 'AUTH.EMAIL' | translate }}</mat-label>
    <input matInput [(ngModel)]="email" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">{{ 'COMMON.CANCEL' | translate }}</button>
  <button matButton="filled" [mat-dialog-close]="email()" cdkFocusInitial>{{ 'COMMON.RESET' | translate }}</button>
</mat-dialog-actions>
