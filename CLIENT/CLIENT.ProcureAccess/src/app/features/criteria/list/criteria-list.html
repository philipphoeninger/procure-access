@if (store.criteriaCount() == 0) {
    <p>{{ 'CRITERIA.EMPTY_LIST' | translate }}</p>
} @else {
    <mat-accordion class="criteria-accordion">
       @for (criterion of store.criteria(); track criterion; let idx = $index, e = $even) {
            <mat-expansion-panel [expanded]="step() === (idx + 1)" (opened)="setStep(idx + 1)"> <!--hideToggle-->
                <mat-expansion-panel-header>
                    <mat-panel-title> {{ criterion.name }} </mat-panel-title>
                    <mat-panel-description>
                        <!-- Type your name and age <mat-icon>account_circle</mat-icon> -->
                        <span>{{ 'CRITERIA.PRIORITY' | translate  }}: 1</span>
                    </mat-panel-description>
                </mat-expansion-panel-header>

                <markdown [data]="criterion.description"></markdown>

                <mat-action-row>
                    @if (idx > 0) {
                      <button matButton (click)="prevStep()">{{ 'COMMON.PREVIOUS' | translate  }}</button>
                    }
                    <button matButton (click)="nextStep()">{{ 'COMMON.NEXT' | translate  }}</button>
                </mat-action-row>
            </mat-expansion-panel>
        }
    </mat-accordion>
}
