  <mat-list-item class="list-item">
    <div class="list-item-container">
        <mat-slide-toggle 
          class="example-margin" 
          labelPosition="before" 
          [(ngModel)]="updateUICustomization().orientationVertical">
            {{ 'SETTINGS.ORIENTATION_VERTICAL' | translate }}
        </mat-slide-toggle>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="app-contrast-picker">{{ 'SETTINGS.CONTRAST_MODE' | translate }}</label>
      <button
        id="app-contrast-picker"
        mat-icon-button
        (click)="toggleContrastMode()">
        <span class="material-symbols-outlined">
            {{ store.highContrastOn() ? 'contrast_rtl_off' : 'contrast'}}
        </span>
      </button>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="app-theme-picker">{{ 'SETTINGS.DARK_MODE' | translate }}</label>
      <button
        id="app-theme-picker"
        mat-icon-button
        (click)="toggleColorMode()">
        <mat-icon>
          {{ store.darkModeOn() ? 'light_mode' : 'dark_mode'}}
        </mat-icon>
      </button>
    </div>
  </mat-list-item>
</mat-list>
<div class="settings-actions">
  <button matButton (click)="resetSettings()">{{ 'COMMON.RESET' | translate }}</button>
  <button matButton="filled" (click)="saveSettings()">{{ 'COMMON.SAVE' | translate }}</button>
</div>
