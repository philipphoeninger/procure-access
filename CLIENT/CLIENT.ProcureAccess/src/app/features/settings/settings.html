<h2 class="heading">Settings</h2>
<mat-list class="settings-list">
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="foreground-cp">Foreground color: </label>
      <div>
        <input
          id="foreground-cp" 
          [(colorPicker)]="updateUICustomization().foregroundColor"
          [style.background]="updateUICustomization().foregroundColor" 
          (openDialog)="(null)"
          (closeDialog)="(null)" 
        />
      </div>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="background-cp">Background color: </label>
      <div>
        <input
          id="background-cp"
          [(colorPicker)]="updateUICustomization().backgroundColor"
          [style.background]="updateUICustomization().backgroundColor"
          (openDialog)="(null)"
          (closeDialog)="(null)" />
      </div>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="text-cp">Text color: </label>
      <div>
        <input
          id="text-cp"
          [(colorPicker)]="updateUICustomization().textColor"
          [style.background]="updateUICustomization().textColor"
          (openDialog)="(null)"
          (closeDialog)="(null)" />
      </div>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
        <mat-slide-toggle 
          class="example-margin" 
          labelPosition="before" 
          [(ngModel)]="updateUICustomization().orientationVertical">
            Orientation: vertical 
        </mat-slide-toggle>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="app-contrast-picker">Contrast mode: </label>
      <button 
        id="app-contrast-picker" 
        mat-icon-button 
        (click)="toggleContrastMode()">
        <span class="material-symbols-outlined">
            {{ store.highContrastOn() ? 'contrast_rtl_off' : 'contrast'}}
        </span>
      </button>
    </div>
  </mat-list-item>
  <mat-divider></mat-divider>
  <mat-list-item class="list-item">
    <div class="list-item-container">
      <label for="app-theme-picker">Dark mode: </label>
      <button
        id="app-theme-picker"
        mat-icon-button
        (click)="toggleColorMode()">
        <mat-icon>
          {{ store.darkModeOn() ? 'light_mode' : 'dark_mode'}}
        </mat-icon>
      </button>
    </div>
  </mat-list-item>
</mat-list>
<div class="settings-actions">
  <button matButton (click)="resetSettings()">Reset</button>
  <button matButton="filled" (click)="saveSettings()">Save</button>
</div>
